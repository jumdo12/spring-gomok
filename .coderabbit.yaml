language: "ko"
reviews:
  auto_review:
    enabled: true
    base_branches:
      - ".*"
  profile: "assertive"
  request_changes_workflow: false
  instructions: |
    다음 항목을 중점적으로 확인해주세요.

    1. 객체지향 설계
    - 단일 책임 원칙 위반 여부
    - 객체 간 의존 방향이 적절한지
    - 도메인 객체가 비즈니스 로직을 직접 보유하는지
    - 불필요한 getter/setter 남용 여부
    - 원시값 포장, 일급 컬렉션 적용 여부

    2. Spring 레이어 아키텍처
    - Controller, Service, Repository 역할 분리가 명확한지
    - 도메인 객체가 영속성 레이어에 종속되지 않는지
    - 트랜잭션 경계가 적절한지

    3. JPA
    - N+1 문제 발생 가능성
    - 연관관계 설정이 적절한지
    - 영속성 컨텍스트 범위가 적절한지

    4. 예외 처리
    - 예외 메시지가 명확한지
    - 적절한 예외 타입을 사용하는지

    5. 네이밍 및 가독성
    - 메서드, 변수명이 의도를 명확히 드러내는지
    - 메서드 길이가 적절한지
