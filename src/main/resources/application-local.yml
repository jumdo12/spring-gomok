spring:
  datasource:
    url: ${db.local.url}
    username: ${db.local.username}
    password: ${db.local.password}
    driver-class-name: ${db.local.driver-class-name}

  jpa:
    database: h2
    hibernate:
      ddl-auto: create-drop

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
