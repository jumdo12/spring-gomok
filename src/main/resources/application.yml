spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import:
      - config/omok/db.yml

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info, metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      access: read_only

logging:
  file:
    name: /app/logs/application.log

