<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 오목 게임</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>회원가입</h1>
            <div class="form-group">
                <label for="userId">아이디</label>
                <input type="text" id="userId" placeholder="아이디를 입력하세요">
            </div>
            <div class="form-group">
                <label for="username">닉네임</label>
                <input type="text" id="username" placeholder="닉네임을 입력하세요">
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력하세요">
            </div>
            <button id="signupBtn" class="btn btn-primary">가입하기</button>
            <button id="loginBtn" class="btn btn-secondary">로그인으로 돌아가기</button>
        </div>
    </div>

    <!-- 에러 모달 -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <h3>오류</h3>
            <p id="errorMessage"></p>
            <button id="closeModalBtn" class="btn btn-primary">확인</button>
        </div>
    </div>

    <script src="/js/signup.js"></script>
</body>
</html>
