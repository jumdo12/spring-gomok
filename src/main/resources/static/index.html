<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오목 게임</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <!-- 로그인 화면 -->
    <div id="login-screen" class="screen">
        <div class="card">
            <h1>🎮 오목 게임</h1>
            <input type="text" id="username" placeholder="아이디 입력" />
            <input type="password" id="password" placeholder="비밀번호 입력" />
            <button onclick="login()">로그인</button>
            <button onclick="showRegister()">회원가입</button>
        </div>
    </div>

    <!-- 회원가입 화면 -->
    <div id="register-screen" class="screen" style="display: none;">
        <div class="card">
            <h1>🎮 회원가입</h1>
            <input type="text" id="reg-username" placeholder="닉네임" />
            <input type="text" id="reg-userid" placeholder="아이디" />
            <input type="password" id="reg-password" placeholder="비밀번호" />
            <button onclick="register()">가입하기</button>
            <button onclick="showScreen('login-screen')">로그인으로</button>
        </div>
    </div>

    <!-- 방 목록 화면 -->
    <div id="lobby-screen" class="screen" style="display: none;">
        <div class="lobby">
            <div class="header">
                <h2>게임 로비</h2>
                <span id="user-info"></span>
            </div>
            <button onclick="createRoom()" class="create-btn">방 만들기</button>
            <div id="room-list" class="room-list"></div>
        </div>
    </div>

    <!-- 대기실 화면 -->
    <div id="room-screen" class="screen" style="display: none;">
        <div class="room">
            <div class="room-header">
                <h2 id="room-name"></h2>
                <button onclick="leaveRoom()">나가기</button>
            </div>
            <div class="players">
                <div class="player-slot">
                    <span class="stone black">●</span>
                    <span id="host-name">대기중...</span>
                    <span class="badge">방장</span>
                </div>
                <div class="player-slot">
                    <span class="stone white">●</span>
                    <span id="participant-name">대기중...</span>
                </div>
            </div>
            <button id="start-btn" onclick="startGame()" disabled>게임 시작</button>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="screen" style="display: none;">
        <div class="game">
            <div class="game-header">
                <button onclick="leaveGame()">나가기</button>
                <h2 id="game-room-name"></h2>
                <div id="turn-indicator"></div>
            </div>
            <div class="game-content">
                <div class="player-info">
                    <div class="stone black">●</div>
                    <span id="my-name"></span>
                </div>
                <canvas id="board" width="600" height="600"></canvas>
                <div class="player-info">
                    <div class="stone white">●</div>
                    <span id="opponent-name"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 게임 결과 모달 -->
    <div id="result-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 id="result-text"></h2>
            <button onclick="closeResultModal()">확인</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/sse.js"></script>
<script src="/js/game.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
