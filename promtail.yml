server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: gomok-server
    static_configs:
      - targets:
          - localhost
        labels:
          job: gomok-server
          __path__: /app/logs/*.log
